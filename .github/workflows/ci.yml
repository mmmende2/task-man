name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # cli + web unit tests and typechecks. web depends on cli's build output
  # (its `file:../cli` dependency snapshots cli/dist at install time, since
  # this repo doesn't use npm workspaces), so cli is built first — same
  # ordering as cli/Dockerfile.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            cli/package-lock.json
            web/package-lock.json

      - name: cli — install, build (typecheck), test
        working-directory: cli
        run: |
          npm ci
          npm run build
          npm test

      - name: web — install, build (typecheck), test
        working-directory: web
        run: |
          npm ci
          npm run build
          npm test

  # Full image build — validates that the production bundle (cli + web)
  # actually compiles into the deployable image. This is the check that
  # catches a broken/stale web bundle before it can ship.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker build
        run: docker build -f cli/Dockerfile --build-arg GIT_SHA="$(git rev-parse --short HEAD)" -t task-man:ci .
