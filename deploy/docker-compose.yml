services:
  task-man:
    build:
      context: ..
      dockerfile: cli/Dockerfile
      args:
        # Stamp the build with `git describe` of the deploying checkout. Set it
        # in the deploy command: `GIT_DESCRIBE=$(git describe --long --always
        # --dirty) docker compose ... up -d --build`. Falls back to 'dev'.
        # `--long` keeps the SHA even exactly on a release tag (v0.5.0-0-g<sha>).
        # Releases are annotated `vX.Y.Z` tags (Changesets), which plain
        # `git describe` anchors to — so a clean release stamps `vX.Y.Z-0-g<sha>`
        # and anything ahead/dirty shows as `vX.Y.Z-N-g<sha>[-dirty]`.
        GIT_DESCRIBE: ${GIT_DESCRIBE:-dev}
    image: task-man:local
    restart: unless-stopped
    environment:
      # Origin-side verification of the Access JWT that Cloudflare attaches
      # to every request — defense in depth beyond the tunnel itself.
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN}
      - CF_ACCESS_AUD=${CF_ACCESS_AUD}
      # Authorization: legacy-task owner + service-token→person mapping.
      - TASK_MAN_DEFAULT_OWNER=${TASK_MAN_DEFAULT_OWNER}
      - TASK_MAN_AGENTS=${TASK_MAN_AGENTS}
      # The server computes "today" (metrics, reports) in ITS local time.
      # Without this the container is UTC and evening completions fall on
      # tomorrow's date, so server-rendered metrics drop them. Set to the
      # primary user's IANA timezone.
      - TZ=${TZ:-UTC}
    volumes:
      - task-man-data:/root/.task-man
    networks:
      - internal
    # Deliberately no `ports:` — cloudflared is the only thing that reaches
    # this container, over the internal docker network. No inbound ports on
    # the droplet itself.

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - internal
    depends_on:
      - task-man

networks:
  internal:
    driver: bridge

volumes:
  task-man-data:
